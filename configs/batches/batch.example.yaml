project_name: RealDynLFV
batch_name: firstsyn

camera:
  reference: CAM_C3
  rows: [A, B, C, D, E]
  columns: [1, 2, 3, 4, 5]
  nominal_fps: 59.94
  image_size: [3840, 2160]

paths:
  raw_root: D:/data/RealDynLFV/raw/firstsyn
  synced_root: D:/data/RealDynLFV/synced/firstsyn
  sync_manifest: D:/data/RealDynLFV/metadata/firstsyn/sync_manifest_firstsyn.json
  calibration_json: D:/data/RealDynLFV/metadata/firstsyn/calibration_raw_stereo_locked_firstsyn.json
  calibration_debug_dir: D:/data/RealDynLFV/metadata/firstsyn/calibration_debug
  calibration_report_dir: D:/data/RealDynLFV/metadata/firstsyn/calibration_report
  rectification_dir: D:/data/RealDynLFV/metadata/firstsyn/rectification
  roi_metadata: D:/data/RealDynLFV/metadata/firstsyn/rectification/release_roi_metadata.json
  time_segments: D:/data/RealDynLFV/configs/firstsyn_time.json
  output_root: D:/data/RealDynLFV/exports/firstsyn
  lut: D:/data/RealDynLFV/assets/dlogm_to_rec709.cube

tools:
  python: D:/anaconda3/envs/pytorch1/python.exe
  ffmpeg: ffmpeg
  ffprobe: ffprobe

sync:
  analyze_seconds: 10
  sample_rate: 48000
  start_delay_seconds: 1.5
  workers: 4
  require_nvenc: true

calibration:
  target_video: 0001.mp4
  checkerboard_inner_corners: [8, 8]
  square_size_mm: 25.0
  sample_start_seconds: 0.1
  sample_interval_seconds: 1.0
  workers: 4

rectification:
  crop_alpha: 0.0
  ignore_distortion: true

roi:
  margin_px: 4
  validation_scenes: ["0002", "0003", "0005"]

export:
  default_profile: benchmark
  workers: 4
  lut_hwaccel: cuda
