project_name: RealDynLFV
batch_id: sample_batch

camera:
  reference: CAM_C3
  rows: [A, B, C, D, E]
  columns: [1, 2, 3, 4, 5]
  nominal_fps: 59.94
  image_size: [3840, 2160]

paths:
  raw_root: /path/to/realdynlfv/raw/sample_batch
  synced_root: /path/to/realdynlfv/synced/sample_batch
  sync_manifest: /path/to/realdynlfv/metadata/sample_batch/sync_manifest.json
  calibration_json: /path/to/realdynlfv/metadata/sample_batch/calibration_raw_stereo_locked.json
  calibration_debug_dir: /path/to/realdynlfv/metadata/sample_batch/calibration_debug
  calibration_report_dir: /path/to/realdynlfv/metadata/sample_batch/calibration_report
  rectification_dir: /path/to/realdynlfv/metadata/sample_batch/rectification
  roi_metadata: /path/to/realdynlfv/metadata/sample_batch/rectification/release_roi_metadata.json
  # Copy configs/time.example.json and edit it for your own selected segments.
  time_segments: /path/to/realdynlfv/configs/sample_batch_time.json
  output_root: /path/to/realdynlfv/exports/sample_batch
  # User-provided LUT path. This repository does not redistribute vendor .cube LUTs.
  lut: /path/to/local/user_provided_lut.cube

tools:
  python: python
  ffmpeg: ffmpeg
  ffprobe: ffprobe

runtime:
  time_key: sample_batch
  shutdown_timeout_sec: 5

sync:
  analyze_seconds: 10
  sample_rate: 48000
  start_delay_seconds: 1.5
  workers: 4
  require_nvenc: true

calibration:
  target_video: 0001.mp4
  checkerboard_inner_corners: [8, 8]
  square_size_mm: 25.0
  sample_start_seconds: 0.1
  sample_interval_seconds: 1.0
  max_frames: 0
  workers: 4

rectification:
  crop_alpha: 0.0
  ignore_distortion: true

roi:
  margin_px: 4
  validation_scenes: ["0001"]
  validation_frame_positions: [start, middle, end]
  black_border_threshold: 0.01
  near_black_threshold: 0.03

export:
  default_profile: benchmark
  default_scene: null
  workers: 4
  lut_hwaccel: cuda
  benchmark:
    jpeg_quality: 97
    resize_target: [1920, 1080]
    bit_depth: 8
  fidelity:
    png_bit_depth: 16
    bit_depth: 16

export_validation:
  default_samples: 3
  upgraded_samples: 9
  black_border_fail_threshold: 0.01
  near_black_warning_threshold: 0.03
  enable_auto_upgrade: true
